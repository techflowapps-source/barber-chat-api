name: Deploy Backend (Render)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - "render.yaml"
      - ".github/workflows/deploy-backend.yml"

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Missing deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK == '' }}
        run: |
          echo "::warning::Defina o secret RENDER_DEPLOY_HOOK no GitHub."
          echo "Render Dashboard > seu servico > Settings > Deploy Hook > copie a URL"
          exit 0
