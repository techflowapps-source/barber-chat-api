# fly.toml — deploy: fly launch && fly secrets import < backend/.env.production
app = "barbershop-whatsapp-api"
primary_region = "gru"

[build]
  dockerfile = "backend/Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"

[mounts]
  source = "wa_sessions"
  destination = "/app/sessions"
